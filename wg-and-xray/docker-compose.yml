services:
  xray:
    image: teddysun/xray
    container_name: xray-server
    restart: always
    volumes:
      - ./config:/etc/xray
    ports:
      - "443:443" # Порт, который видит провайдер
    environment:
      - TZ=Europe/Moscow

  wireguard:
    image: linuxserver/wireguard
    container_name: wg-server
    restart: always
    cap_add:
      - NET_ADMIN
    volumes:
      - ./wg-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - SERVERPORT=51820
      - PEERS=1
    ports:
      - "51820:51820/udp"