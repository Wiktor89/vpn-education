services:
  xray-client:
    # Запускать на российском сервере (91.188.215.79)
    image: teddysun/xray:latest
    container_name: xray-reality-client
    restart: no
    # Host network нужен, чтобы цепочка phone->RF->US корректно маршрутизировалась на хосте РФ.
    network_mode: "host"
    volumes:
      # Связанный файл Reality-клиента: xray-client/config/config.json
      - ./config/config.json:/etc/xray/config.json:ro

  wireguard-client:
    # Запускать на российском сервере (91.188.215.79)
    image: linuxserver/wireguard:latest
    container_name: wg-client
    restart: no
    # Host network нужен, чтобы интерфейс wg0 был доступен хосту для policy routing.
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      # Связанный файл WireGuard-клиента: xray-client/wg-config/wg_confs/wg0.conf
      - ./wg-config/wg_confs/wg0.conf:/config/wg_confs/wg0.conf:ro