services:
  wg-easy-rf:
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy-rf
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      # RF public IP used in generated phone QR configs.
      - WG_HOST=91.188.215.79
      # WireGuard port for phone clients.
      - WG_PORT=51823
      # Web admin panel port.
      - PORT=51822
      # Replace by your own hash generated via:
      # docker run --rm -it ghcr.io/wg-easy/wg-easy wgpw "YOUR_PASSWORD"
      - PASSWORD_HASH=$$2b$$12$$.HhU.E0gUMdnjyMQrQAi/OW0KfLPAm1.XsEsCXJ1xEc94Mq7kGXPC
      # Phone clients DNS.
      - WG_DEFAULT_DNS=1.1.1.1,8.8.8.8
      # Phone subnet.
      - WG_DEFAULT_ADDRESS=10.8.0.x
    volumes:
      - ./.wg-easy:/etc/wireguard
    ports:
      - "51823:51823/udp"
      - "51822:51822/tcp"
